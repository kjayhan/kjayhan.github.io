# from https://github.com/andrewheiss/ath-quarto/blob/main/research/_metadata.yml

description-meta: "{{< meta website.description >}}"

# Date format
date-format: "YYYY"

# Enable banner style title blocks
title-block-banner: "#004440"

# Default for table of contents
toc: true
toc-title: Contents
toc-location: left

# Default knitr options
execute:
  echo: false
  message: false
  warning: false

include-back-link: true

format:
  html:
    template-partials:
      - ../html/research/title-block.html